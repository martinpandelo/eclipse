<div class="swiper mainFichaCarousel" #swiperDiv>
  <div class="swiper-wrapper">
    @for (file of images; track $index) {
      <div class="swiper-slide position-relative">

        <!-- Si es VIDEO -->
        @if (isVideo(file)) {
          <video
            class="w-100 rounded"
            muted
            playsinline
            controls="true"
            >
            <source [src]="file | pathImage:imageType()" type="video/mp4" />
          </video>
        }

        <!-- Si es IMAGEN -->
        @else {
          <a data-fancybox="gallery" [href]="file | pathImage:imageType()">
            <div class="zoom"
                      ><svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="24"
                        height="24"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="#d3713d"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      >
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        <line x1="11" y1="8" x2="11" y2="14" />
                        <line x1="8" y1="11" x2="14" y2="11" />
                      </svg>
            </div>
            <img
              [src]="file | pathImage:imageType()"
              class="w-100 object-fit-cover rounded"
            />
          </a>
        }
      </div>
    }
  </div>

  <div class="swiper-pagination"></div>
  <div class="swiper-button-prev"></div>
  <div class="swiper-button-next"></div>
</div>


<div class="swiper mt-3 thumbnailCarousel" #thumbsDiv>
  <div class="swiper-wrapper">

    @for (file of images; track $index) {

      <div class="swiper-slide">

        @if (isVideo(file)) {
          <div class="thumb-video-wrapper">
            <video muted>
              <source [src]="file | pathImage:imageType()" type="video/mp4" />
            </video>
            <div class="play-overlay">▶</div>
          </div>
        }
        @else {
          <img
            [src]="file | pathImage:imageType()"
            class="thumb-img w-100 h-100 object-fit-cover"
          />
        }

      </div>
    }
  </div>
</div>
