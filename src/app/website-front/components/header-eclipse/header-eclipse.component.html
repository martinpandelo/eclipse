    <header>
      <div class="container-fluid g-0 overflow-hidden">
        <nav class="navbar main-navbar px-3 py-2" [class.scrolled]="navbarScrolled">
          <button
            class="navbar-toggler border-0"
            type="button"
            id="menuToggle"
            aria-label="Abrir menú"
            (click)="toggleMenu()"
            [class.open]="menuActive"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
        </nav>

        <div
          id="fullscreenMenu"
          class="fullscreen-menu flex-column justify-content-center align-items-center font-martian"
          [class.active]="menuActive"
        >
          <ul class="list-unstyled text-center mt-5 pt-5">
            <li>
              <a [routerLink]="['./']" (click)="closeMenu()" class="nav-link px-2 px-lg-5 py-3 fs-4 mb-3 mb-lg-4 text-uppercase"
                >Home</a>
            </li>
            <li>
              <a [routerLink]="['.']" fragment="servicios" (click)="closeMenu()" class="nav-link px-2 px-lg-5 py-3 fs-4 mb-3 mb-lg-4 text-uppercase"
                >Servicios</a>
            </li>
            <li>
              <a [routerLink]="['.']" fragment="empresa" (click)="closeMenu()" class="nav-link px-2 px-lg-5 py-3 fs-4 mb-3 mb-lg-4 text-uppercase"
                >Nuestra Empresa</a>
            </li>
            <li>
              <a [routerLink]="['.']" fragment="contacto" (click)="closeMenu()" class="nav-link px-2 px-lg-5 py-3 fs-4 mb-3 mb-lg-4 text-uppercase"
                >Contacto</a>
            </li>
          </ul>
        </div>

        <div class="row align-items-stretch">
          <div class="col-lg-4 col-md-6 offset-lg-1 pt-3 pt-lg-5">
            <a [routerLink]="['./']"
              class="pb-5 d-block mx-4 mx-lg-0">
              <img
                src="/assets/img/logo-main-eclipse.png"
                alt="Eclipse"
                height="70"
                data-aos="fade-right"
                data-aos-offset="300"
                data-aos-easing="ease-in-sine"
                data-aos-delay="100"
              >
            </a>

            <h2
              class="text-uppercase font-martian py-4 mx-4 mx-lg-0 lh-base fw-light"
              data-aos="fade-right"
              data-aos-offset="300"
              data-aos-easing="ease-in-sine"
              data-aos-delay="400"
            >
              matricería<br />
              inyección<br />
              soplado
            </h2>
            <p
              class="mt-3 text-highlight text-primary py-4 mx-4 mx-lg-0 fs-4 lh-sm"
              data-aos="fade-right"
              data-aos-offset="300"
              data-aos-easing="ease-in-sine"
              data-aos-delay="700"
            >
              Tecnología, precisión y <br />diseño en cada luminaria
            </p>
          </div>


          <div class="col-lg-7 col-md-6">
            <div
              class="video-wrapper h-100 overflow-hidden position-relative"
              data-aos="flip-left"
              id="videoContainer"
              (click)="playVideo()"
            >
              <!-- Imagen previa -->
              <img
                src="/assets/img/video-eclipse.jpg"
                alt="Video presentación Eclipse"
                class="w-100 h-100 object-fit-cover"
                loading="lazy"
                *ngIf="!isPlaying"
              />

              <!-- Ícono de play -->
              <svg
                *ngIf="!isPlaying"
                width="100"
                height="70"
                viewBox="0 0 100 70"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <rect width="100" height="70" rx="12" fill="white" fill-opacity="0.7" />
                <path d="M40 25L65 35L40 45V25Z" fill="#000000" />
              </svg>

              <!-- Video -->
              <video
                *ngIf="isPlaying"
                class="w-100 h-100 object-fit-cover"
                autoplay
                muted
                controls
                playsinline
              >
                <source src="/assets/videos/Eclipse_1.mp4" type="video/mp4" />
                Tu navegador no soporta la reproducción de video.
              </video>
            </div>
          </div>



        </div>
      </div>
    </header>
