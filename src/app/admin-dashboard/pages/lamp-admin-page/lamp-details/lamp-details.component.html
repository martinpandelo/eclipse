<form [formGroup]="lampForm" (ngSubmit)="onSubmit()">

  <!-- Barra sticky -->
  <div
    class="position-sticky top-0 bg-white border-bottom px-4 px-lg-5 py-3"
    style="z-index: 1040; backdrop-filter: blur(4px);"
  >
    <div class="d-flex align-items-center gap-3">
      <h1 class="flex-grow-1 h3 fw-bold text-truncate mb-0">
        @if (lamp().name) {
          {{ lamp().name }}
        } @else {
          Nueva lámpara
        }
      </h1>

      <button class="btn btn-success btn-lg" type="submit" [disabled]="isLoading()">
        @if (isLoading()) {
          <span class="spinner-border spinner-border-sm me-2"></span>
          Guardando...
        } @else {
          Guardar
        }
      </button>
    </div>
  </div>

  <!-- Contenido -->
  <div class="row g-4 px-4 px-lg-5 pt-4">

    <!-- Datos generales -->
    <div class="col-12 col-md-8">

      <div class="mb-3">
        <label for="name" class="form-label fw-semibold">Nombre</label>
        <input
          id="name"
          type="text"
          class="form-control"
          placeholder="Nombre"
          formControlName="name"
          [class.is-invalid]="formUtils.isValidField(lampForm, 'name')"
        />
        <form-error-label [control]="lampForm.get('name')!" fieldName="name" />
      </div>

    </div>

    <!-- Imágenes -->
    <div class="col-12 col-md-4 d-flex flex-column gap-3">

      <!-- Imagen actual -->
      <div class="position-relative">
        <img
          [src]="lampForm.value.image | pathImage:'lamparas'"
          alt="Imagen"
          style="max-height: 80px; object-fit: cover;"
        />
        @if (lampForm.value.image) {
          <button
            type="button"
            (click)="removeImage()"
            class="btn btn-sm btn-danger position-absolute top-0 end-0 m-1"
          >
            ✕
          </button>
        }
      </div>

      <!-- Input file -->
      <div>
        <input
          type="file"
          accept="image/*"
          class="form-control mt-2"
          (change)="onFilesChanged($event)"
        />
      </div>

    </div>


  </div>
</form>

<!-- Toast de éxito -->
@if (wasSaved()) {
  <div class="toast-container position-fixed top-0 start-50 translate-middle-x p-3" style="z-index: 1080;">
    <div class="toast align-items-center text-bg-success border-0 show">
      <div class="d-flex">
        <div class="toast-body">
          {{ successMessage() }}
        </div>
        <button
          type="button"
          class="btn-close btn-close-white me-2 m-auto"
          (click)="wasSaved.set(false)"
        ></button>
      </div>
    </div>
  </div>
}
