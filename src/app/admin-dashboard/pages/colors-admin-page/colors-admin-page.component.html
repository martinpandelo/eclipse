<div class="d-flex align-items-center gap-2 mb-3">
  <h1 class="h2 fw-bold mb-0">Listado de colores</h1>
  <div class="flex-grow-1"></div>
  <a routerLink="/admin/color/0" class="btn btn-success btn-lg">
    Nuevo color
  </a>
</div>

<hr class="my-4" />

<!-- Listado -->
<color-table
  [colors]="colorResource.value()?.colors ?? []"

/>
